//  PFOSTENKRACHER – Pixel Elfmeterschießen
//  Hochkant-Layout, 16-Bit-Optik, 12 Trefferzonen, wahrscheinlichkeitsbasiert.
// ════════════════════════════════════════════════════════════════════════════
const W = 224, H = 398;                       // internes Pixel-Hochformat (~9:16)
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;
ctx.imageSmoothingEnabled = false;

function resize() {
  // füllt den Bildschirm möglichst groß aus (auf dem Handy sehr breit/hoch)
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);
resize();

// ─── AUDIO ──────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, type='sine', vol=0.3, decay=true) {
  try {
    const a = getAudio(), g = a.createGain(), o = a.createOscillator();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime);
    if (decay) g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + dur);
  } catch(e) {}
}
function playNoise(dur, vol=0.15) {
  try {
    const a = getAudio(), buf = a.createBuffer(1, a.sampleRate * dur, a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    const src = a.createBufferSource(), g = a.createGain();
    src.buffer = buf; g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    src.connect(g); g.connect(a.destination); src.start();
  } catch(e) {}
}
const SFX = {
  ui()   { playTone(660, 0.06, 'square', 0.18); },
  step() { playTone(110, 0.05, 'sine', 0.18); playNoise(0.03, 0.06); },
  kick() { playTone(90, 0.16, 'sine', 0.5); playNoise(0.09, 0.32); },
  goal() {
    [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,0.28,'square',0.28),i*110));
    setTimeout(()=>playNoise(1.0, 0.18), 120);
  },
  save() { playTone(240,0.18,'triangle',0.4); setTimeout(()=>playTone(170,0.3,'triangle',0.3),160); playNoise(0.12,0.18); },
  post() { playTone(1300,0.05,'square',0.5); setTimeout(()=>playTone(950,0.32,'sine',0.3),60); },
  miss() { playTone(220,0.14,'sine',0.4); setTimeout(()=>playTone(150,0.3,'sine',0.3),150); },
  slip() {
    const a = getAudio();
    try {
      const o=a.createOscillator(),g=a.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime(600,a.currentTime);
      o.frequency.exponentialRampToValueAtTime(100,a.currentTime+0.4);
      g.gain.setValueAtTime(0.35,a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.4);
      o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+0.4);
    } catch(e){}
  },
  whistle() {
    playTone(1900,0.18,'sine',0.35,false);
    setTimeout(()=>playTone(2100,0.16,'sine',0.35,false),120);
    setTimeout(()=>playTone(1900,0.001,'sine',0,true),300);
  },
  tick() { playTone(820,0.05,'square',0.16); },
  crowd() {
    try {
      const a=getAudio(), buf=a.createBuffer(1,a.sampleRate*2,a.sampleRate);
      const d=buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.sin(i/1000);
      const src=a.createBufferSource(), g=a.createGain(), filt=a.createBiquadFilter();
      src.buffer=buf; src.loop=true; filt.type='lowpass'; filt.frequency.value=420;
      g.gain.value=0.045;
      src.connect(filt); filt.connect(g); g.connect(a.destination); src.start();
    } catch(e){}
  }
};
let crowdStarted = false;

function drawFlag(fl, x, y, w, h) {
  ctx.save();
  ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  const f = fl.flag;
  if (!f) { ctx.fillStyle='#555'; ctx.fillRect(x,y,w,h); }
  else if (f.t==='h') { const bh=h/3; for(let i=0;i<3;i++){ctx.fillStyle=f.c[i];ctx.fillRect(x,y+i*bh,w,bh+1);} }
  else if (f.t==='v') { const bw=w/3; for(let i=0;i<3;i++){ctx.fillStyle=f.c[i];ctx.fillRect(x+i*bw,y,bw+1,h);} }
  else if (f.t==='hr'||f.t==='vr') {
    const tot=f.r.reduce((a,b)=>a+b,0); let o=0;
    for(let i=0;i<f.c.length;i++){ const seg=(f.t==='hr'?h:w)*f.r[i]/tot; ctx.fillStyle=f.c[i];
      if(f.t==='hr') ctx.fillRect(x,y+o,w,seg+1); else ctx.fillRect(x+o,y,seg+1,h); o+=seg; }
  }
  else if (f.t==='cross') { ctx.fillStyle=f.bg; ctx.fillRect(x,y,w,h);
    ctx.fillStyle=f.cr; ctx.fillRect(x,y+h/2-h*0.12,w,h*0.24); ctx.fillRect(x+w/2-w*0.12,y,w*0.24,h); }
  else if (f.t==='circle') { ctx.fillStyle=f.bg; ctx.fillRect(x,y,w,h);
    ctx.fillStyle=f.c; ctx.beginPath(); ctx.arc(x+w/2,y+h/2,Math.min(w,h)*0.27,0,7); ctx.fill(); }
  else if (f.t==='brazil') { ctx.fillStyle='#16a34a'; ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#FFD21A'; ctx.beginPath();
    ctx.moveTo(x+w/2,y+2); ctx.lineTo(x+w-3,y+h/2); ctx.lineTo(x+w/2,y+h-2); ctx.lineTo(x+3,y+h/2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#1d4ed8'; ctx.beginPath(); ctx.arc(x+w/2,y+h/2,Math.min(w,h)*0.16,0,7); ctx.fill(); }
  ctx.restore();
  ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=1; ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
}

function pixelText(text, x, y, color='#fff', scale=1, shadow=true) {
  const str = (''+text).toUpperCase();
  let cx = x;
  for (const ch of str) {
    const g = F[ch] || F['?'];
    for (let r=0;r<7;r++) for (let c=0;c<5;c++) {
      if (g[r][c]==='1') {
        if (shadow) { ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(cx+c*scale+scale, y+r*scale+scale, scale, scale); }
      }
    }
    for (let r=0;r<7;r++) for (let c=0;c<5;c++) {
      if (g[r][c]==='1') { ctx.fillStyle=color; ctx.fillRect(cx+c*scale, y+r*scale, scale, scale); }
    }
    cx += 6*scale;
  }
  return cx - x;
}
function textWidth(text, scale=1) { return (''+text).length * 6 * scale - scale; }
function textC(text, cx, y, color='#fff', scale=1, shadow=true) {
  pixelText(text, Math.round(cx - textWidth(text,scale)/2), y, color, scale, shadow);
}

// ─── HILFEN ───────────────────────────────────────────────────────────────────
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function lerp(a,b,t){ return a+(b-a)*t; }
function easeOut(t){ return 1-(1-t)*(1-t); }
function easeIn(t){ return t*t; }
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ════════════════════════════════════════════════════════════════════════════
//  SPRITES
// ════════════════════════════════════════════════════════════════════════════
// playerIdx: 0 = Fiete (blond, klein) · 1 = Jonte (braune lange Haare, groß)
function px(x,y,w,h,col){ ctx.fillStyle=col; ctx.fillRect(Math.round(x),Math.round(y),w,h); }

function drawPlayer(cx, feetY, playerIdx, teamIdx, anim, frame, facing=1, opts={}) {
  const team = gs.teams[teamIdx] || TEAMS[0];
  const isKeeper = !!opts.keeper;
  const shirt   = isKeeper ? '#1faa4d' : team.shirt;
  const shirtSh = isKeeper ? '#127a35' : shade(team.shirt,-0.28);
  const shorts  = isKeeper ? '#0d1a33' : team.shorts;
  const shortsSh= shade(shorts,-0.3);
  const skin = '#f2c39a', skinSh = '#d39e75';
  const hair = playerIdx===1 ? '#5a3a1c' : '#e8c34a';
  const hairSh = playerIdx===1 ? '#3f280f' : '#b9931f';
  const sock = '#f4f4f4', boot='#1c1c1c';
  const big = playerIdx===1;

  let bob=0, armUp=0, legA=0, legB=0, lean=0, dive=0, splay=0;
  const f = frame|0;
  if (anim==='idle')      { bob = Math.sin(f*0.08)*0.8; }
  else if (anim==='ready'){ bob = Math.sin(f*0.18)*1.4; legA=2; legB=-2; }
  else if (anim==='run')  { const p=f%4; bob=(p===1||p===3)?-1:0; legA=(p<2?-4:4); legB=(p<2?4:-4); lean=2; }
  else if (anim==='kick') { if(f<3){legA=5;legB=-5;lean=1;} else {legA=-7;legB=3;lean=-1;} }
  else if (anim==='cheer'){ armUp=-5+(f%2)*2; bob=(f%2)*-2; }
  else if (anim==='sad')  { bob=2; lean=1; }
  else if (anim==='slip') { dive=1; }
  else if (anim==='dive') { dive=1; splay=opts.splay||0; }

  ctx.save();
  ctx.translate(Math.round(cx), Math.round(feetY));
  if (facing<0) ctx.scale(-1,1);

  const torsoH = big?13:11, torsoW = big?12:11, headR = big?7:6;
  const hipY = -16 - (big?2:0);

  if (dive) {
    // Hechtsprung / Ausrutscher: horizontaler Körper (Kopf+Arme links, Beine rechts)
    ctx.save(); ctx.translate(0, -9);
    // nachgezogene Beine (rechts)
    px(6, -2, 9, 6, shorts); px(6,-2,9,2,shade(shorts,0.18));
    px(14, -1, 7, 5, sock);
    px(20, -1, 5, 4, boot);
    // Rumpf (horizontal)
    px(-6, -5, 13, 9, shirt);
    px(-6, -5, 13, 2, shade(shirt,0.2));
    px(-6, 2, 13, 2, shirtSh);
    if (isKeeper) px(-6, -1, 13, 1, '#0c5a26');
    // Kopf (links)
    px(-13, -6, 8, 8, skin);
    px(-13, -7, 8, 3, hair);
    if (big) px(-14, -4, 2, 9, hair);          // Jonte: lange Haare
    px(-9, -3, 1, 2, '#23303f');               // Auge
    // Arme nach vorne (links) – Parade
    px(-19, -4, 7, 4, isKeeper?shirt:(team.sleeves||shirt));
    px(-24, -5, 6, 4, skin);
    if (isKeeper){ px(-29,-6,5,6,'#f4d03f'); px(-29,-6,5,2,'#caa72f'); }  // Handschuh
    else px(-28,-5,4,4,skin);
    ctx.restore();
    ctx.restore();
    drawShadow(cx, feetY, 16);
    return;
  }

  // Schatten zuerst (in Weltkoordinaten, daher außerhalb des flip)
  // Beine
  const legY = hipY+ (big?9:8);
  px(-5, legY+legA*0, 4, 7, shorts);            // Hüfte links abdeckung
  // linkes Bein
  px(-5, legY, 4, 6, shirt===shirt?shorts:shorts);
  px(-5, legY+legA, 4, 6, shorts);
  px(-5, legY+6+legA, 4, 4, sock);
  px(-6, legY+10+legA, 5, 3, boot);
  // rechtes Bein
  px(1, legY, 4, 6, shorts);
  px(1, legY+legB, 4, 6, shorts);
  px(1, legY+6+legB, 4, 4, sock);
  px(0, legY+10+legB, 5, 3, boot);

  // Shorts-Block
  px(-6, hipY+5, 12, 6, shorts);
  px(-6, hipY+5, 12, 2, shade(shorts,0.18));
  px(-6, hipY+9, 12, 2, shortsSh);

  // Rumpf / Trikot
  const tx=-Math.floor(torsoW/2), ty=hipY-torsoH+5;
  px(tx, ty, torsoW, torsoH, shirt);
  px(tx, ty, torsoW, 3, shade(shirt,0.2));          // Lichtkante Schulter
  px(tx, ty+torsoH-3, torsoW, 3, shirtSh);          // Schatten unten
  // Trikot-Muster
  if (team.stripes && !isKeeper) {
    for (let i=0;i<torsoW;i+=4){ px(tx+i, ty, 2, torsoH, '#ffffff'); }
  } else if (team.checker && !isKeeper) {
    for (let r=0;r<torsoH;r+=3) for(let c=0;c<torsoW;c+=3){ if(((r/3|0)+(c/3|0))%2) px(tx+c,ty+r,3,3,'#ffffff'); }
  } else if (!isKeeper && team.accent) {
    px(tx, ty+Math.floor(torsoH/2), torsoW, 1, team.accent);
  }
  if (isKeeper){ px(tx,ty+2,torsoW,1,'#0c5a26'); px(tx,ty+torsoH-5,torsoW,1,'#0c5a26'); }

  // Arme
  const armY = ty+1;
  if (anim==='cheer') {
    px(tx-2, armY+armUp, 3, 6, shirt); px(tx-3, armY-3+armUp, 3, 4, skin);
    px(tx+torsoW-1, armY+armUp, 3, 6, shirt); px(tx+torsoW, armY-3+armUp, 3, 4, skin);
  } else {
    px(tx-2, armY, 3, 7, team.sleeves||shirt); px(tx-2, armY+7, 3, 3, skin);
    px(tx+torsoW-1, armY, 3, 7, team.sleeves||shirt); px(tx+torsoW-1, armY+7, 3, 3, skin);
    if (isKeeper){ px(tx-2,armY+9,3,3,'#f4d03f'); px(tx+torsoW-1,armY+9,3,3,'#f4d03f'); }
  }

  // Kopf
  const headY = ty - headR - 1;
  px(-headR+1, headY, headR*2-2, headR*2-1, skin);
  px(-headR+1, headY, headR*2-2, 2, skinSh===skinSh?shade(skin,0.12):skin); // sanftes Licht
  px(headR-2, headY+2, 2, headR, skinSh);                 // Wangenschatten
  // Augen
  px(-2, headY+headR-1, 1, 2, '#23303f');
  px(1,  headY+headR-1, 1, 2, '#23303f');
  // Haare
  px(-headR+1, headY-1, headR*2-2, 3, hair);
  px(-headR+1, headY-1, headR*2-2, 1, shade(hair,0.25));
  px(-headR, headY+1, 2, big?6:3, hair);                  // Seite
  px(headR-2, headY+1, 2, big?6:3, hair);
  if (big) { // Jonte: lange braune Haare
    px(-headR-1, headY+1, 2, 9, hair); px(headR-1, headY+1, 2, 9, hair);
    px(-headR-1, headY+8, 2, 2, hairSh); px(headR-1, headY+8, 2, 2, hairSh);
  } else {   // Fiete: kurzer blonder Scheitel
    px(-1, headY-2, 4, 2, hair);
  }

  if (anim==='kick' && f>=3) { px(3, legY+legA-1, 9, 3, '#dddddd'); /* Bewegungslinie */ }

  ctx.restore();
  drawShadow(cx, feetY, big?12:10);
}

function drawShadow(cx, feetY, w) {
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(cx, feetY+2, w, 3.5, 0, 0, Math.PI*2); ctx.fill();
}

function shade(hex, amt) {
  // amt -1..1 (negativ=dunkler)
  let h = hex.replace('#','');
  if (h.length===3) h = h.split('').map(c=>c+c).join('');
  let r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  const f = amt<0 ? 1+amt : 1; const add = amt>0 ? amt*255 : 0;
  r=clamp(r*f+add,0,255)|0; g=clamp(g*f+add,0,255)|0; b=clamp(b*f+add,0,255)|0;
  return 'rgb('+r+','+g+','+b+')';
}

function drawBall(x, y, r=5) {
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(x, y+r+2, r*0.85, r*0.3, 0, 0, Math.PI*2); ctx.fill();
  // Kugel mit Schattierung
  const grd = ctx.createRadialGradient(x-r*0.35,y-r*0.35,r*0.2,x,y,r);
  grd.addColorStop(0,'#ffffff'); grd.addColorStop(1,'#c9d2dc');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#23272e';
  ctx.beginPath(); ctx.arc(x, y-r*0.05, r*0.34, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(35,39,46,0.85)';
  ctx.beginPath(); ctx.arc(x-r*0.6, y+r*0.3, r*0.18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*0.6, y+r*0.3, r*0.18, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPitch() {

function drawGoal(withNet=true) {
  const g=GOAL;

  if (withNet) {
    ctx.fillStyle='rgba(225,235,245,0.10)'; ctx.fillRect(g.x,g.y,g.w,g.h);
    ctx.strokeStyle='rgba(235,242,250,0.35)'; ctx.lineWidth=1;
    for (let x=g.x; x<=g.x+g.w; x+=8){ ctx.beginPath(); ctx.moveTo(x,g.y); ctx.lineTo(x,g.y+g.h); ctx.stroke(); }
    for (let y=g.y; y<=g.y+g.h; y+=7){ ctx.beginPath(); ctx.moveTo(g.x,y); ctx.lineTo(g.x+g.w,y); ctx.stroke(); }
  }
  // Pfosten & Latte (mit Schatten)
  ctx.fillStyle='#d7dde6';
  ctx.fillRect(g.x-4, g.y-4, 4, g.h+4);
  ctx.fillRect(g.x+g.w, g.y-4, 4, g.h+4);

  ctx.fillRect(g.x-4, g.y-4, 2, g.h+4);
  ctx.fillRect(g.x+g.w, g.y-4, 2, g.h+4);
  ctx.fillRect(g.x-4, g.y-4, g.w+8, 2);
}

// ─── ZONEN (4×3 = 12) ─────────────────────────────────────────────────────────
const ZC = 4, ZR = 3, NZ = ZC*ZR;
function zoneRect(geom, z){
  const col=z%ZC, row=(z/ZC)|0;
  return { x: geom.x + col*geom.w/ZC, y: geom.y + row*geom.h/ZR, w: geom.w/ZC, h: geom.h/ZR, col, row };
}
function zoneCenter(geom, z){ const r=zoneRect(geom,z); return { x:r.x+r.w/2, y:r.y+r.h/2 }; }

// ─── ERGEBNIS-BERECHNUNG (wahrscheinlichkeitsbasiert) ─────────────────────────
function calcResult(sZone, kZone){
  const sCol=sZone%ZC, sRow=(sZone/ZC)|0;
  const kCol=kZone%ZC, kRow=(kZone/ZC)|0;

  // 1) Ausrutscher des Schützen
  if (Math.random() < 0.035) return { goal:false, event:'slip-shooter' };

  // 2) Schussgenauigkeit: Eck-/Oben-Platzierung ist riskanter
  const outerCol = (sCol===0 || sCol===ZC-1);
  const topRow   = (sRow===0);
  let missGoal = 0.05;
  if (outerCol) missGoal += 0.10;
  if (topRow)   missGoal += 0.08;
  if (outerCol && topRow) missGoal += 0.05;
  if (Math.random() < missGoal) {
    // Pfosten (außen) oder drüber (oben)
    if (topRow && Math.random()<0.55) return { goal:false, event:'over' };
    return { goal:false, event:'post' };
  }

  // 3) Torwart-Parade: Wahrscheinlichkeit fällt mit Distanz Schuss<->Sprung
  const dc = sCol-kCol, dr = sRow-kRow;
  const dist = Math.sqrt(dc*dc + dr*dr);
  let saveP = 0.90 * Math.exp(-0.85*dist);     // d0~0.90, d1~0.38, d1.41~0.27, d2~0.16
  // Mitte ist für den Keeper etwas leichter zu erlaufen, Ecken schwerer:
  if (outerCol) saveP *= 0.9;
  saveP = clamp(saveP, 0.02, 0.92);
  if (Math.random() < saveP) {
    // seltener Abpraller -> trotzdem Tor (Nachschuss-Gefühl)
    if (Math.random() < 0.05) return { goal:true, event:'rebound' };
    return { goal:false, event:'saved' };
  }

  // 4) Tor — seltener Torwart-Patzer mit eigener Botschaft
  if (Math.random() < 0.03) return { goal:true, event:'keeper-slip' };
  return { goal:true, event:'goal' };
}

    ctx.lineWidth=hover?2:1; ctx.strokeRect(r.x+1.5,r.y+1.5,r.w-3,r.h-3);
    // Zielkreuz
    const cxp=r.x+r.w/2, cyp=r.y+r.h/2;
    ctx.strokeStyle=hover?'#fff':'rgba(255,255,255,0.25)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cxp-4,cyp); ctx.lineTo(cxp+4,cyp); ctx.moveTo(cxp,cyp-4); ctx.lineTo(cxp,cyp+4); ctx.stroke();
    buttons.push({id:'z'+z, x:r.x, y:r.y, w:r.w, h:r.h});
  }

  // kleine Vorschau (Schütze/Keeper)
  if (isShooter) drawPlayer(W/2, H-22, gs.shooter, gs.shooter, 'ready', gs.t, 1);
  else { const kp=1-gs.shooter; drawPlayer(W/2, H-22, kp, kp, 'ready', gs.t, 1, {keeper:true}); }

  textC('TIPPE EINE ZONE', W/2, H-34, '#bcd0ee', 1);
}

function drawGoalAim(g){
  // Netz-Hintergrund
  ctx.fillStyle='#0c2038'; ctx.fillRect(g.x-3,g.y-3,g.w+6,g.h+6);
  ctx.fillStyle='rgba(220,232,245,0.10)'; ctx.fillRect(g.x,g.y,g.w,g.h);
  ctx.strokeStyle='rgba(235,242,250,0.22)'; ctx.lineWidth=1;
  for (let x=g.x; x<=g.x+g.w; x+=10){ ctx.beginPath(); ctx.moveTo(x,g.y); ctx.lineTo(x,g.y+g.h); ctx.stroke(); }
  for (let y=g.y; y<=g.y+g.h; y+=9){ ctx.beginPath(); ctx.moveTo(g.x,y); ctx.lineTo(g.x+g.w,y); ctx.stroke(); }
  // Rahmen
  ctx.fillStyle='#ffffff';
  ctx.fillRect(g.x-4,g.y-4,4,g.h+8); ctx.fillRect(g.x+g.w,g.y-4,4,g.h+8); ctx.fillRect(g.x-4,g.y-4,g.w+8,4);
}

// ─── SCHUSSSZENE (entschleunigt, mit Aufbau & Anlauf) ─────────────────────────
// Frame-Fahrplan @ ~60fps:
//  0–78   AUFBAU (Ball wird gelegt, Spieler steht, Pause ~1s)
//  78–124 ANLAUF
//  124–132 SCHUSS (Kontakt @128)
//  128–166 BALLFLUG + Hechten des Keepers
//  166–    ERGEBNIS (Jubel/Trauer)
const T = { setup:78, runEnd:124, kick:128, reach:166, result:240 };
let kickPlayed=false, sfxPlayed=false, anticip=false;

function drawShot(){
  let sx=0, sy=0;
  if (gs.shake>0){ sx=(Math.random()-0.5)*gs.shake*2|0; sy=(Math.random()-0.5)*gs.shake*2|0; gs.shake-=0.6; }
  ctx.save(); ctx.translate(sx,sy);

  drawStadium(); drawPitch(); drawGoal(true);

  const t = gs.shotT;
  const ev = gs.shotResult.event;
  const sCenter = zoneCenter(GOAL, gs.shooterZone);

  // Torwart-Position
  const kCenter = zoneCenter(GOAL, gs.keeperZone);
  const keeperBaseX = W/2, keeperBaseY = GOAL_LINE-2;
  let kx=keeperBaseX, ky=keeperBaseY, kReach=0, kFacing=(gs.keeperZone%ZC)<2?1:-1, splay=0;
  if (t>=120){
    const kp = easeOut(clamp((t-120)/40,0,1));
    kx = lerp(keeperBaseX, kCenter.x, kp);
    ky = lerp(keeperBaseY, kCenter.y+14, kp*0.6);
    kReach = kp;
    splay = (gs.keeperZone%ZC)<2?-1:1;
  } else {
    ky = keeperBaseY + Math.sin(t*0.18)*1.5;  // bereitschaftliches Wippen
  }

  // Schütze
  let shooterAnim='ready', shFacing=1;
  let shX=SPOT.x-2, shY=SPOT.y+30;
  if (t < T.setup){ shooterAnim='ready'; shX=SPOT.x-14; shY=SPOT.y+34; }
  else if (t < T.runEnd){ const p=easeIn((t-T.setup)/(T.runEnd-T.setup)); shooterAnim='run'; shX=lerp(SPOT.x-14,SPOT.x-9,p); shY=lerp(SPOT.y+34,SPOT.y+8,p); }
  else if (t < T.kick+8){ shooterAnim='kick'; shX=SPOT.x-9; shY=SPOT.y+6; }
  else {
    shX=SPOT.x-9; shY=SPOT.y+6;
    if (gs.shotResult.goal) shooterAnim = t>T.reach ? 'cheer' : 'idle';
    else shooterAnim = t>T.reach ? 'sad' : 'idle';
  }
  if (ev==='slip-shooter' && t>=T.runEnd) shooterAnim='slip';

  // Ball
  let ballR=5, ballX=SPOT.x, ballY=SPOT.y, ballVisible=true;
  let target = { x:sCenter.x, y:sCenter.y };
  if (ev==='over') target = { x:sCenter.x, y:GOAL.y-16 };
  if (ev==='post') target = { x: (gs.shooterZone%ZC)<2?GOAL.x-2:GOAL.x+GOAL.w+2, y:sCenter.y };
  if (ev==='slip-shooter') target = { x:SPOT.x+(Math.random()<0.5?-30:30), y:SPOT.y-20 };

  if (t < T.kick){ ballX=SPOT.x; ballY=SPOT.y; ballR=5; }
  else {
    const fp = clamp((t-T.kick)/(T.reach-T.kick), 0, 1);
    ballX = lerp(SPOT.x, target.x, fp);
    ballY = lerp(SPOT.y, target.y, fp) - Math.sin(fp*Math.PI)*16;
    ballR = lerp(5, 2.5, fp);
    // nach Parade/Pfosten: Ball prallt ab
    if (t>T.reach){
      const bp=clamp((t-T.reach)/26,0,1);
      if (ev==='saved'){ ballX=lerp(target.x,kx-14,bp); ballY=lerp(target.y,ky+18,bp)-Math.sin(bp*Math.PI)*10; }
      else if (ev==='post'){ ballX=lerp(target.x,target.x+(target.x<W/2?20:-20),bp); ballY=lerp(target.y,SPOT.y-10,bp); }
      else if (ev==='over'){ ballVisible=false; }
    }
  }
  if (ev==='slip-shooter' && t<T.runEnd) ballVisible=true;

  // Zeichnen: Tiefe -> Keeper & Ball hinter/vor je nach y bleibt simpel
  drawPlayer(kx, ky, 1-gs.shooter, 1-gs.shooter, kReach>0.15?'dive':'ready', gs.t, kFacing, {keeper:true, splay});
  if (ballVisible) drawBall(ballX|0, ballY|0, Math.max(1.5,ballR));
  drawPlayer(shX, shY, gs.shooter, gs.shooter, shooterAnim, gs.t, shFacing);

  // Netz-Beule bei Tor
  if (gs.shotResult.goal && t>T.reach && ev!=='keeper-slip'){
    const np=clamp((t-T.reach)/16,0,1);
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.arc(sCenter.x, sCenter.y, 6+np*8, 0, 7); ctx.fill();
  }

  // SFX-Trigger
  if (t>=T.setup && !whistleDone){ SFX.whistle(); whistleDone=true; }
  if (t>=T.kick && !kickPlayed){ SFX.kick(); kickPlayed=true; gs.shake=3; }
  if (t>=T.reach && !sfxPlayed){
    sfxPlayed=true;
    if (gs.shotResult.goal){ SFX.goal(); spawnConfetti(50); gs.shake=5; }
    else if (ev==='post') SFX.post();
    else if (ev==='over') SFX.miss();
    else if (ev==='slip-shooter') SFX.slip();
    else SFX.save();
  }

  // Ergebnis-Text
  if (t>T.reach+6){
    let txt='', col='#fff';
    if (ev==='goal'||ev==='rebound'){ txt='TOR!'; col='#ffd23f'; }
    else if (ev==='keeper-slip'){ txt='PATZER – TOR!'; col='#ffd23f'; }
    else if (ev==='saved'){ txt='GEHALTEN!'; col='#4bc8ff'; }
    else if (ev==='post'){ txt='PFOSTEN!'; col='#ffb0b0'; }
    else if (ev==='over'){ txt='DRÜBER!'; col='#ff8a8a'; }
    else if (ev==='slip-shooter'){ txt='AUSGERUTSCHT!'; col='#ff9a3a'; }
    const pop = clamp((t-T.reach-6)/8,0,1);
    const sc = 2 + Math.round(pop) ;
    textC(txt, W/2, 70, col, 3);
  }

  drawConfetti();
  ctx.restore();

  gs.shotT++;
  if (gs.shotT>T.result+24) advanceAfterShot();
}
let whistleDone=false;

function drawScoreboard(){
  ctx.fillStyle='#070d1c'; ctx.fillRect(0,0,W,H);
  drawStadium();
  ctx.fillStyle='rgba(7,13,28,0.9)'; ctx.fillRect(0,52,W,H-52);

  textC('SPIELSTAND', W/2, 70, '#ffd23f', 2);
  // Namen + Scores
  for (let p=0;p<2;p++){
    const bx = p===0 ? W*0.27 : W*0.73;
    textC(NAMES[p], bx, 98, p===0?'#ffe08a':'#a9d0ff', 1);
    drawFlag(gs.teams[p], bx-22, 108, 44, 26);
    textC(gs.teams[p].name, bx, 138, '#cfe0f7', 1);
    textC(''+gs.scores[p], bx, 150, '#fff', 3);
  }
  textC(':', W/2, 152, '#7f93b4', 3);

  // Schuss-Marken
  for (let p=0;p<2;p++){
    const baseX = p===0 ? 16 : W/2+10;
    for (let i=0;i<gs.maxRounds;i++){
      const x=baseX+i*16, y=196;
      const g = gs.shots[p][i];
      if (g===undefined){ ctx.strokeStyle='#33425e'; ctx.lineWidth=1; rr(x+0.5,y+0.5,12,12,3); ctx.stroke(); }
      else { ctx.fillStyle=g?'#2fbf4a':'#cf3a3a'; rr(x,y,13,13,3); ctx.fill(); drawMark(x,y,g); }
    }
  }

  const rl = gs.suddenDeath ? 'VERLÄNGERUNG' : 'RUNDE '+gs.round+' / '+gs.maxRounds;
  textC(rl, W/2, 224, '#9fb6d6', 1);

  buttons=[];
  if ((gs.t>>4)&1) button('next', W/2-60, 300, 120, 32, 'WEITER', '#3fcf6a', '#04210f');
  else buttons.push({id:'next',x:W/2-60,y:300,w:120,h:32});

  updateConfetti(); drawConfetti();
}
function drawMark(x,y,good){
  ctx.strokeStyle=good?'#04210f':'#2a0606'; ctx.lineWidth=2;
  if (good){ ctx.beginPath(); ctx.moveTo(x+3,y+7); ctx.lineTo(x+5,y+10); ctx.lineTo(x+10,y+3); ctx.stroke(); }
  else { ctx.beginPath(); ctx.moveTo(x+3,y+3); ctx.lineTo(x+10,y+10); ctx.moveTo(x+10,y+3); ctx.lineTo(x+3,y+10); ctx.stroke(); }
}

function drawEnd(){
  ctx.fillStyle='#060a18'; ctx.fillRect(0,0,W,H);
  drawStadium(); drawPitch();
  ctx.fillStyle='rgba(6,10,24,0.55)'; ctx.fillRect(0,0,W,H);

  const win = gs.scores[0]>gs.scores[1]?0:gs.scores[1]>gs.scores[0]?1:-1;
  if (win>=0){
    textC(NAMES[win], W/2, 40, '#ffd23f', 3);
    textC('GEWINNT!', W/2, 76, '#ffd23f', 3);
    drawPlayer(W*0.32, 250, win, win, 'cheer', gs.t, 1);
    drawPlayer(W*0.68, 252, 1-win, 1-win, 'sad', gs.t, -1, {keeper:true});
    textC(gs.teams[win].name, W/2, 110, '#cfe0f7', 1);
  } else {
    textC('UNENTSCHIEDEN', W/2, 56, '#ffb0b0', 2);
    drawPlayer(W*0.32, 250, 0, 0, 'idle', gs.t, 1);
    drawPlayer(W*0.68, 250, 1, 1, 'idle', gs.t, -1);
  }
  textC(gs.scores[0]+' : '+gs.scores[1], W/2, 130, '#fff', 4);

  buttons=[];
  button('again', W/2-66, 320, 132, 32, 'NOCHMAL', '#3fcf6a', '#04210f');
  button('menu',  W/2-66, 358, 132, 28, 'HAUPTMENÜ', '#4b9bff', '#04132a');

  updateConfetti(); drawConfetti();
  if (gs.t%80===0) spawnConfetti(20);
}

// ════════════════════════════════════════════════════════════════════════════
//  ABLAUF-LOGIK
// ════════════════════════════════════════════════════════════════════════════
function startMatch(){
  gs.scores=[0,0]; gs.shots=[[],[]];
  gs.round=0; gs.shotInRound=0; gs.shooter=0; gs.suddenDeath=false; gs.maxRounds=5;
  startRoundHandoff(true);
}
function startRoundHandoff(isShooterTurn){
  gs.aimPhase = isShooterTurn?'shooter':'keeper';
  gs.handoffIsShooter = isShooterTurn;
  gs.handoffTarget = isShooterTurn ? gs.shooter : (1-gs.shooter);
  gs.state='handoff'; gs.t=0;
}
function beginAim(){
  gs.state='aim'; gs.t=0; gs.aimTimer=7; gs.aimLocked=false;
  if (gs.aimPhase==='shooter') gs.shooterZone=null; else gs.keeperZone=null;
  startAimTimer();
}
function startAimTimer(){
  clearInterval(gs.aimTick);
  gs.aimTick=setInterval(()=>{
    gs.aimTimer-=1; if(gs.aimTimer<=3 && gs.aimTimer>0) SFX.tick();
    if (gs.aimTimer<=0){
      clearInterval(gs.aimTick);
      if (gs.aimPhase==='shooter' && gs.shooterZone===null) gs.shooterZone=Math.random()*NZ|0;
      if (gs.aimPhase==='keeper'  && gs.keeperZone===null)  gs.keeperZone=Math.random()*NZ|0;
      advanceAimPhase();
    }
  },1000);
}
function advanceAimPhase(){
  clearInterval(gs.aimTick);
  if (gs.aimPhase==='shooter'){
    gs.aimPhase='keeper';
    startRoundHandoff(false);
  } else {
    executeShot();
  }
}
function executeShot(){
  gs.shotResult = calcResult(gs.shooterZone, gs.keeperZone);
  gs.state='shot'; gs.shotT=0;
  kickPlayed=false; sfxPlayed=false; whistleDone=false; gs.pendingAdvance=false;
}
function advanceAfterShot(){
  if (gs.pendingAdvance) return; gs.pendingAdvance=true;
  const isGoal = gs.shotResult.goal;
  gs.shots[gs.shooter][gs.round] = isGoal;
  if (isGoal) gs.scores[gs.shooter]++;
  gs.state='scoreboard'; gs.t=0;
}
function afterScoreboard(){
  if (gs.shotInRound===0){
    gs.shotInRound=1; gs.shooter=1-gs.shooter;
    startRoundHandoff(true);
  } else {
    gs.shotInRound=0; gs.round++; gs.shooter=0;
    if (isMatchOver()){ gs.state='end'; gs.t=0; spawnConfetti(70); }
    else startRoundHandoff(true);
  }
}
function isMatchOver(){
  const s0=gs.scores[0], s1=gs.scores[1];
  const n0=gs.shots[0].filter(x=>x!==undefined).length;
  const n1=gs.shots[1].filter(x=>x!==undefined).length;
  if (!gs.suddenDeath){
    // vorzeitige Entscheidung
    const rem0=gs.maxRounds-n0, rem1=gs.maxRounds-n1;
    if (s0-s1>rem1) return true;
    if (s1-s0>rem0) return true;
    if (n0>=gs.maxRounds && n1>=gs.maxRounds){
      if (s0!==s1) return true;
      gs.suddenDeath=true; gs.maxRounds++; return false;
    }
    if (n0>=gs.maxRounds && n1>=gs.maxRounds) return true;
    return false;
  } else {
    // Sudden Death: nach jeder vollständigen Runde
    if (n0===n1 && n0>0 && s0!==s1) return true;
    if (n0>=gs.maxRounds && n1>=gs.maxRounds){ gs.maxRounds++; }
    return false;
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  EINGABE
// ════════════════════════════════════════════════════════════════════════════
function canvasXY(e){
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width, sy=H/rect.height;
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return { x:(cx-rect.left)*sx, y:(cy-rect.top)*sy };
}
function onClick(e){
  if (overlayOpen) return;
  e.preventDefault();
  if (!audioCtx){ try{ getAudio(); }catch(err){} }
  if (!crowdStarted){ SFX.crowd(); crowdStarted=true; }
  const {x,y}=canvasXY(e);
  const id=hitButton(x,y);

  switch(gs.state){
    case 'title':
      if (id==='start'){ SFX.ui(); startCountrySelect(); }
      else if (id==='settings'){ SFX.ui(); openOverlay(); }
      break;
    case 'country': {
      if (id && id[0]==='c'){
        SFX.ui();
        const idx=+id.slice(1);
        const pl=gs.chooseOrder[gs.choosePhase];
        gs.teams[pl]=TEAMS[idx];
        if (gs.choosePhase===0){ gs.choosePhase=1; }
        else { startMatch(); }
      }
      break; }
    case 'handoff':
      if (id==='go'){ SFX.ui(); beginAim(); }
      break;
    case 'aim':
      if (id && id[0]==='z' && !gs.aimLocked){
        const z=+id.slice(1); SFX.tick();
        if (gs.aimPhase==='shooter') gs.shooterZone=z; else gs.keeperZone=z;
        gs.aimLocked=true;
        clearInterval(gs.aimTick);
        setTimeout(advanceAimPhase, 420);
      }
      break;
    case 'scoreboard':
      if (id==='next'){ SFX.ui(); afterScoreboard(); }
      break;
    case 'end':
      if (id==='again'){ SFX.ui(); gs.confetti=[]; startCountrySelect(); }
      else if (id==='menu'){ SFX.ui(); gs.confetti=[]; gs.state='title'; gs.t=0; }
      break;
  }
}
function startCountrySelect(){
  gs.teams=[null,null];
  gs.chooseOrder = Math.random()<0.5?[0,1]:[1,0];
  gs.choosePhase=0;
  gs.state='country'; gs.t=0;
}
canvas.addEventListener('click', onClick);
canvas.addEventListener('touchstart', onClick, {passive:false});

// ─── OVERLAY (Einstellungen) ──────────────────────────────────────────────────
const overlay=document.getElementById('overlay');
const inp1=document.getElementById('inp1'), inp2=document.getElementById('inp2');
let overlayOpen=false;
function openOverlay(){
  overlayOpen=true; overlay.classList.add('show');
  inp1.value=NAMES[0]; inp2.value=NAMES[1];
}
function closeOverlay(){ overlayOpen=false; overlay.classList.remove('show'); }
function sanitize(v,def){ v=(v||'').toUpperCase().replace(/[^A-ZÄÖÜ ]/g,'').trim().slice(0,9); return v||def; }
document.getElementById('ovSave').addEventListener('click', ()=>{
  NAMES=[sanitize(inp1.value,'FIETE'), sanitize(inp2.value,'JONTE')];
  saveNames(NAMES[0],NAMES[1]); closeOverlay(); SFX.ui();
});
document.getElementById('ovCancel').addEventListener('click', ()=>{ closeOverlay(); });

// ════════════════════════════════════════════════════════════════════════════
//  HAUPTSCHLEIFE
// ════════════════════════════════════════════════════════════════════════════
function loop(){
  gs.t=(gs.t||0)+1;
  ctx.clearRect(0,0,W,H);
  switch(gs.state){
    case 'title':      drawTitle(); break;
    case 'country':    drawCountry(); break;
    case 'handoff':    drawHandoff(); break;
    case 'aim':        drawAim(); break;
    case 'shot':       drawShot(); break;
    case 'scoreboard': drawScoreboard(); break;
    case 'end':        drawEnd(); break;
  }
  requestAnimationFrame(loop);
}
loop();
</script>
